server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to sensitive files
    location ~ /\.env { deny all; }
    location ~ /data/ { deny all; }
    location ~ /logs/ { deny all; }
    location ~ /tests/ { deny all; }
    location ~ /docs/ { deny all; }
    location ~ /migrations/ { deny all; }
    location ~ /node_modules/ { deny all; }
    location ~ /_old/ { deny all; }
    location ~ /\.git { deny all; }
    location = /cron_triggers.php { deny all; }

    # Allow data/avatars
    location /data/avatars/ {
        alias /var/www/html/data/avatars/;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
